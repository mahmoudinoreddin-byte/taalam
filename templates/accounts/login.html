{% extends 'base.html' %}
{% block title %}Sign In — Portfòlio{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-16">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="font-serif text-3xl font-semibold mb-2">Welcome back</h1>
      <p class="text-muted text-sm">Sign in to your account</p>
    </div>
    <div class="bg-bg2 border border-white/5 rounded-2xl p-8">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="text-xs text-muted mb-1.5 block">Username</label>
          {{ form.username }}
        </div>
        <div>
          <label class="text-xs text-muted mb-1.5 block">Password</label>
          {{ form.password }}
        </div>
        <button type="submit" class="w-full bg-accent text-white py-3 rounded-xl font-medium hover:bg-accent/80 transition-colors text-sm mt-2">
          Sign in →
        </button>
      </form>
      <p class="text-center text-muted text-xs mt-5">
        No account yet? <a href="{% url 'register' %}" class="text-accent hover:underline">Create one</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
