{% extends 'base.html' %}
{% block title %}Compose Message — Portfòlio{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
  <a href="{% url 'inbox' %}" class="text-muted hover:text-text text-sm mb-8 inline-block">← Inbox</a>
  <h1 class="font-serif text-2xl font-semibold mb-8">New message</h1>
  <div class="bg-bg2 border border-white/5 rounded-2xl p-8">
    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="text-xs text-muted mb-1.5 block">To (username)</label>
        <input type="text" name="recipient"
               value="{{ recipient.username|default:'' }}"
               {% if recipient %}readonly{% endif %}
               class="w-full bg-bg3 border border-white/10 rounded-xl px-4 py-3 text-text text-sm focus:outline-none focus:border-accent/50 placeholder-muted"
               placeholder="username">
      </div>
      <div>
        <label class="text-xs text-muted mb-1.5 block">Subject <span class="text-muted/50">(optional)</span></label>
        <input type="text" name="subject"
               class="w-full bg-bg3 border border-white/10 rounded-xl px-4 py-3 text-text text-sm focus:outline-none focus:border-accent/50 placeholder-muted"
               placeholder="What's this about?">
      </div>
      <div>
        <label class="text-xs text-muted mb-1.5 block">Message</label>
        <textarea name="body" rows="6"
                  class="w-full bg-bg3 border border-white/10 rounded-xl px-4 py-3 text-text text-sm focus:outline-none focus:border-accent/50 placeholder-muted resize-none"
                  placeholder="Write your message..."></textarea>
      </div>
      <div class="flex gap-3 pt-1">
        <button type="submit" class="bg-accent text-white px-6 py-2.5 rounded-xl text-sm font-medium hover:bg-accent/80 transition-colors">
          Send message →
        </button>
        <a href="{% url 'inbox' %}" class="border border-white/10 text-muted px-6 py-2.5 rounded-xl text-sm hover:border-white/20 transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
